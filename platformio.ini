; =============================================================================
; M5DialBMS v7 - PlatformIO Configuration
;
; M5Unified and M5GFX are pinned to 0.1.16 — the same version used by the
; Dial Display project which correctly initialises the AXP2101 backlight
; on M5Dial after a full chip erase (web installer).
;
; Do NOT upgrade M5Unified past 0.1.x without testing the web installer —
; 0.2.x versions have different AXP2101 init behaviour.
;
; lib/ folder (vendored M5GFX/M5Unified) is no longer needed and can be
; deleted from the repo.
; =============================================================================

[env:m5dial]
platform  = espressif32 @ 6.10.0
framework = arduino
board     = esp32-s3-devkitc-1

; ---- Flash layout ----
board_build.partitions  = default_8MB.csv
board_build.flash_size  = 8MB
board_build.flash_mode  = dio
board_build.flash_freq  = 80m
board_build.f_cpu       = 240000000L

; ---- Build flags ----
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DLV_CONF_SKIP=0
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BAR=1
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_COLOR_DEPTH=16

; ---- Upload & monitor ----
upload_protocol = esp-builtin
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time

; ---- Libraries ----
; M5Unified and M5GFX pinned to 0.1.16 — same as Dial Display project.
; This version correctly initialises the AXP2101 backlight on M5Dial
; after a full chip erase (web installer). Later versions (0.2.x) have
; different AXP2101 init behaviour that leaves the backlight off.
; M5GFX 0.1.16 does NOT bundle LVGL 9 so no collision with lvgl 8.4.0.
lib_deps =
    m5stack/M5Unified                    @ 0.1.16
    m5stack/M5GFX                        @ 0.1.16
    lvgl/lvgl                            @ 8.4.0
    esphome/AsyncTCP-esphome             @ 2.1.4
    esphome/ESPAsyncWebServer-esphome    @ 3.3.0
    bblanchon/ArduinoJson                @ 7.3.1

lib_ldf_mode = deep+
