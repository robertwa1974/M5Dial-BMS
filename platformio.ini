; =============================================================================
; TeslaBMS M5Dial v7 - PlatformIO Configuration
;
; M5GFX 0.2.21 and M5Unified 0.2.15 bundle LVGL 9 internally.
; The standalone lvgl 8.4.0 collides with this — there is no configuration
; fix. The solution is to vendor M5GFX and M5Unified into lib/.
;
; ONE-TIME SETUP (do this on the dev machine, then commit lib/ to git):
;   mkdir -p lib
;   cp -r .pio/libdeps/m5dial/M5GFX    lib/M5GFX
;   cp -r .pio/libdeps/m5dial/M5Unified lib/M5Unified
;
; After that, delete M5GFX and M5Unified from .pio/libdeps and rebuild.
; Every subsequent clone just works — no registry, no version chaos.
;
; IF M5GFX in lib/ is >= 0.2.7 (bundles LVGL 9), Display.cpp needs the
; LVGL 9 migration (lv_display_create etc). The current Display.cpp uses
; LVGL 8 API and requires M5GFX < 0.2.7.
; =============================================================================

[env:m5dial]
platform  = espressif32 @ 6.10.0
framework = arduino
board     = esp32-s3-devkitc-1

; ---- Flash layout ----
board_build.partitions  = default_8MB.csv
board_build.flash_size  = 8MB
board_build.flash_mode  = dio
board_build.flash_freq  = 80m
board_build.f_cpu       = 240000000L

; ---- Build flags ----
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DLV_CONF_SKIP=0
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BAR=1
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_COLOR_DEPTH=16

; ---- Upload & monitor ----
upload_protocol = esptool
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time

; ---- Libraries ----
; M5GFX and M5Unified are vendored in lib/ — NOT listed here.
; lvgl @ 8.4.0 requires M5GFX < 0.2.7 in lib/ (pre-LVGL9-bundled).
lib_deps =
    lvgl/lvgl                            @ 8.4.0
    esphome/AsyncTCP-esphome             @ 2.1.4
    esphome/ESPAsyncWebServer-esphome    @ 3.3.0
    bblanchon/ArduinoJson                @ 7.3.1

lib_ldf_mode = deep+
