; =============================================================================
; TeslaBMS M5Dial v6 - PlatformIO Configuration
; Features: LVGL display, WiFi dashboard, CAN TX+RX, active balancing,
;           BMW i3 CAN slave support, CAN charger inhibit, larger fonts
; =============================================================================

[env:m5dial]
platform  = espressif32
framework = arduino
board     = esp32-s3-devkitc-1

; ---- Flash layout ----
board_build.partitions  = default_8MB.csv
board_build.flash_size  = 8MB
board_build.flash_mode  = qio
board_build.flash_freq  = 80m
board_build.f_cpu       = 240000000L

; ---- Build flags ----
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0
    -DCORE_DEBUG_LEVEL=0
    ; LVGL config - use M5GFX as driver, enable required fonts
    -DLV_CONF_SKIP=0
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BAR=1
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_COLOR_DEPTH=16

; ---- Upload & monitor ----
upload_protocol = esptool
upload_speed    = 921600
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time

; ---- Libraries ----
lib_deps =
    m5stack/M5Unified                    @ ^0.2.4
    m5stack/M5GFX                        @ ^0.2.4
    lvgl/lvgl                            @ ^8.4.0
    esphome/AsyncTCP-esphome             @ ^2.1.4
    esphome/ESPAsyncWebServer-esphome    @ ^3.3.0
    bblanchon/ArduinoJson                @ ^7.3.1

lib_ldf_mode = deep+
